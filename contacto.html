<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contacto y reservas - Casa Rural Vega de Espinareda en El Bierzo. Disponible 24/7 para tu alojamiento rural en Moreda.">
    <meta name="keywords" content="contacto, reserva casa rural, alojamiento Vega de Espinareda, casa rural El Bierzo, turismo rural">
    <meta name="author" content="Casa Rural El Encinal">
    <meta property="og:title" content="Contacto | Casa Rural Vega de Espinareda">
    <meta property="og:description" content="Reserva tu estancia en casa rural Vega de Espinareda. Contacta con nosotros ahora.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://casaruralencinal.es/contacto.html">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#FFFFFF">
    <title>Contacto | Casa Rural Vega de Espinareda - El Bierzo</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    
    <!-- Tema - Se ejecuta ANTES del CSS -->
    <script>
    (function() {
        const themes = {
            "gris-cobre": {
                "name": "Gris + Cobre Moderno",
                "primary": "#1F1F1F",
                "secondary": "#B8860B",
                "accent": "#D4A574",
                "tertiary": "#6B8C6F",
                "light-bg": "#FAFAF8",
                "white": "#FFFFFF",
                "border": "#E8E3DB",
                "gradient-main": "linear-gradient(135deg, #2A2A2A 0%, #1F1F1F 50%, #3A3A3A 100%)",
                "gradient-hover": "linear-gradient(135deg, #353535 0%, #2A2A2A 50%, #454545 100%)",
                "shine": "inset 0 1px 0 rgba(255, 255, 255, 0.2), inset 0 -2px 0 rgba(0, 0, 0, 0.3)"
            }
        };
        const theme = themes["gris-cobre"];
        document.documentElement.style.setProperty('--primary-color', theme.primary);
        document.documentElement.style.setProperty('--secondary-color', theme.secondary);
        document.documentElement.style.setProperty('--accent-color', theme.accent);
        document.documentElement.style.setProperty('--tertiary-color', theme.tertiary);
        document.documentElement.style.setProperty('--light-bg', theme['light-bg']);
        document.documentElement.style.setProperty('--white', theme.white);
        document.documentElement.style.setProperty('--border-color', theme.border);
        document.documentElement.style.setProperty('--gradient-metallic', theme['gradient-main']);
        document.documentElement.style.setProperty('--gradient-metallic-hover', theme['gradient-hover']);
        document.documentElement.style.setProperty('--shine-effect', theme.shine);
    })();
    </script>
    
    <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>
    <!-- Header y Navegación -->
    <div id="header-placeholder"></div>



    <!-- Sección Contacto -->
    <section class="contacto">
        <div class="container">
            <h1 class="section-title">Ponte en Contacto</h1>
            <p class="section-subtitle">Llámanos para reservar o resolver cualquier duda</p>

            <div class="contacto-nuevo">

                <!-- Tarjetas de teléfono -->
                <div class="telefono-cards">
                    <div class="telefono-card">
                        <div class="telefono-icon">📞</div>
                        <div class="telefono-info">
                            <p class="telefono-nombre">Bea</p>
                            <a href="tel:625433640" class="telefono-numero">625 433 640</a>
                        </div>
                        <a href="tel:625433640" class="btn-llamar">Llamar</a>
                    </div>
                    <div class="telefono-card">
                        <div class="telefono-icon">📞</div>
                        <div class="telefono-info">
                            <p class="telefono-nombre">Conchi</p>
                            <a href="tel:626740217" class="telefono-numero">626 740 217</a>
                        </div>
                        <a href="tel:626740217" class="btn-llamar">Llamar</a>
                    </div>
                </div>

                <!-- Ubicación con mapa -->
                <div class="ubicacion-box">
                    <h3 class="ubicacion-titulo">📍 Cómo llegar</h3>
                    <p class="ubicacion-texto">Moreda · El Bierzo · León</p>
                    <div class="mapa-container">
                        <iframe
                            src="https://maps.google.com/maps?q=Moreda,+Le%C3%B3n,+Spain&t=&z=13&ie=UTF8&iwloc=&output=embed"
                            width="100%"
                            height="380"
                            style="border:0; border-radius: 12px;"
                            allowfullscreen=""
                            loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade"
                            title="Ubicación Casa Rural El Encinal - Moreda, El Bierzo">
                        </iframe>
                    </div>
                </div>

            </div>
        </div>
    </section>
    <div id="footer-placeholder"></div>

    <script src="src/js/theme-manager.js"></script>
    <script src="src/js/components.js"></script>
    <script src="src/js/cookies-banner.js"></script>
    <script src="src/js/main.js"></script>
</body>
</html>
