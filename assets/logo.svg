<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Fondo circular -->
    <circle cx="100" cy="100" r="95" fill="#1a5f3f" opacity="0.1" stroke="#2d8659" stroke-width="2" />

    <!-- Montañas de fondo -->
    <path d="M 30 120 L 60 70 L 90 95 L 120 60 L 170 110" fill="none" stroke="#2d8659"
        stroke-width="2" opacity="0.6" />

    <!-- Casa principal (casita) -->
    <!-- Pared principal -->
    <rect x="70" y="100" width="60" height="50" fill="#e8d4b8" stroke="#2d8659" stroke-width="1.5" />

    <!-- Techo (triángulo) -->
    <polygon points="70,100 100,65 130,100" fill="#d4af37" stroke="#2d8659" stroke-width="1.5" />

    <!-- Puerta -->
    <rect x="90" y="120" width="20" height="30" fill="#8b6914" stroke="#2d8659" stroke-width="1" />
    <circle cx="108" cy="135" r="2" fill="#d4af37" />

    <!-- Ventana izquierda -->
    <rect x="75" y="110" width="12" height="12" fill="#87ceeb" stroke="#2d8659" stroke-width="1" />
    <line x1="81" y1="110" x2="81" y2="122" />
    <line x1="75" y1="116" x2="87" y2="116" />

    <!-- Ventana derecha -->
    <rect x="113" y="110" width="12" height="12" fill="#87ceeb" stroke="#2d8659" stroke-width="1" />
    <line x1="119" y1="110" x2="119" y2="122" />
    <line x1="113" y1="116" x2="125" y2="116" />

    <!-- Chimenea -->
    <rect x="115" y="75" width="8" height="20" fill="#8b4513" stroke="#2d8659" stroke-width="1" />
    <rect x="114" y="72" width="10" height="4" fill="#a0522d" />

    <!-- Árbol a la izquierda -->
    <circle cx="45" cy="135" r="12" fill="#2d8659" />
    <rect x="43" y="135" width="4" height="15" fill="#8b6914" />

    <!-- Árbol a la derecha -->
    <circle cx="155" cy="140" r="10" fill="#2d8659" />
    <rect x="153" y="140" width="4" height="12" fill="#8b6914" />

    <!-- Detalles de montaña frontal -->
    <path d="M 20 140 L 50 100 L 80 140" fill="#2d8659" opacity="0.3" />
    <path d="M 120 140 L 150 95 L 180 140" fill="#2d8659" opacity="0.2" />

    <!-- Texto del nombre -->
    <text x="100" y="180" font-family="Georgia, serif" font-size="12" font-weight="bold"
        text-anchor="middle" fill="#2d8659">EL ENCINAL</text>
</svg>